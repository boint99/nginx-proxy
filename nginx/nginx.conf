#/etc/nginx/nginx.conf
user www-data;
worker_processes auto;
worker_cpu_affinity auto; # Tự động phân bổ tải cho các nhân CPU
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn; # Giảm log level để tăng hiệu năng
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024; # Tăng nhẹ từ 768 lên 1024
    multi_accept on; # Chấp nhận nhiều kết nối mới cùng lúc
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # BẢO MẬT: Ẩn hoàn toàn phiên bản Nginx
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on; # Ưu tiên các bộ mã hóa mạnh của server
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    ##
    # Logging Settings
    ##
    # Định nghĩa format log gọn gàng hơn
    access_log /var/log/nginx/access.log;
    ## caches
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=MY_API_CACHE:10m max_size=1g inactive=60m use_temp_path=off; # Định nghĩa cache với tên MY_API_CACHE, kích thước 10MB, tối đa 1GB, và thời gian không hoạt động là 60 phút
    ##
    # Gzip Settings - Kích hoạt để web React load cực nhanh
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024; # Chỉ nén các phản hồi lớn hơn 1KB
    gzip_comp_level 5; # Mức nén cân bằng giữa CPU và dung lượng
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
